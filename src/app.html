<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%A9%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#221b16" />
    <title>Snap &amp; Solve</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          // Skip registration in local dev so HMR isn't intercepted.
          var host = window.location.hostname;
          if (host === 'localhost' || host === '127.0.0.1') return;
          navigator.serviceWorker.register('/service-worker.js').catch(function (e) {
            console.warn('SW registration failed:', e);
          });
        });
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Fredoka:wght@300..700&family=Press+Start+2P&display=swap"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
