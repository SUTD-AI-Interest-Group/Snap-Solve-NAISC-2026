<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%A9%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snap &amp; Solve</title>
    <script>
      // Kill any stale service worker (and its caches) on this origin —
      // common in dev when another SvelteKit/PWA project has run on
      // localhost:5173 and left a workbox SW behind that intercepts every
      // fetch with a CacheFirst strategy.
      (function () {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          var hadController = !!navigator.serviceWorker.controller;
          if (regs.length === 0 && !hadController) return;
          Promise.all(regs.map(function (r) { return r.unregister(); }))
            .then(function () {
              if ('caches' in window) {
                return caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                });
              }
            })
            .then(function () {
              // If this page load was being intercepted, escape with one reload.
              if (hadController && !sessionStorage.getItem('sw-killed')) {
                sessionStorage.setItem('sw-killed', '1');
                window.location.reload();
              }
            });
        });
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Fredoka:wght@300..700&family=Press+Start+2P&display=swap"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
