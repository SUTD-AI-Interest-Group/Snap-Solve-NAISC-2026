<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%A9%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#221b16" />
    <title>Snap &amp; Solve</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          var host = window.location.hostname;
          var isLocal = host === 'localhost' || host === '127.0.0.1';
          if (isLocal) {
            // In local dev we don't WANT the SW: it intercepts HMR.
            // Skipping `register()` isn't enough — a SW registered by a
            // prior session (or a different project on the same port) can
            // still be controlling this page. Unregister anything we find
            // and clear its caches so the next reload is clean.
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              if (regs.length === 0) return;
              Promise.all(
                regs.map(function (r) {
                  return r.unregister();
                })
              ).then(function () {
                if ('caches' in window) {
                  return caches.keys().then(function (keys) {
                    return Promise.all(
                      keys.map(function (k) {
                        return caches.delete(k);
                      })
                    );
                  });
                }
              });
            });
            return;
          }
          navigator.serviceWorker.register('/service-worker.js').catch(function (e) {
            console.warn('SW registration failed:', e);
          });
        });
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Fredoka:wght@300..700&family=Press+Start+2P&display=swap"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
