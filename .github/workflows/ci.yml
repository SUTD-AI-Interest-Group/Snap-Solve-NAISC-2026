name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --no-audit --no-fund --prefer-offline
      - run: npm run lint
      - run: npm run check
      - run: npm test
      - run: npm run build
